<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayCanvas Earth</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      canvas {
        display: block;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 10;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-logo {
        width: min(84vw, 480px);
        opacity: 0;
      }

      #loading-logo.intro {
        animation: logoIntro 1.5s ease forwards;
      }

      @keyframes logoIntro {
        0% { opacity: 0; }
        66.666% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-cIYlx6x-.js"></script>
  </head>
  <body>
    <div id="loading-screen">
      <img id="loading-logo" src="./assets/logo-BvIX77LX.png" alt="Loading logo" />
    </div>
    <canvas id="app"></canvas>
  </body>
</html>
